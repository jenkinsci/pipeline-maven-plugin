name: 'IT Tests'

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  it-tests:
    strategy:
      fail-fast: false
      matrix:
        test: [ maven-database/PipelineMavenPluginMariaDbDaoITest,
          maven-database/PipelineMavenPluginMySqlDaoITest,
          maven-database/PipelineMavenPluginPostgreSqlDaoITest,
          maven/ConfigurationAsCodeITest,
          maven/CoveragePublisherITest,
          maven/DependencyFingerprintPublisherITest,
          maven/DependencyGraphITest,
          maven/DockerDowstreamITest,
          maven/DownstreamPipelineTriggerRunListenerITest,
          maven/GlobalPipelineMavenConfigITest,
          maven/InvokerRunsPublisherITest,
          maven/JacocoReportPublisherITest,
          maven/JavaGitContainerITest,
          maven/MaskPasswordsConsoleLogFilterITest,
          maven/WithMavenStepGlobalConfigurationITest,
          maven/WithMavenStepITest,
          maven/WithMavenStepMavenExecResolutionITest,
          maven/WithMavenStepOnMasterITest ]

    runs-on: [ubuntu-latest]
    name: '${{ matrix.test }}'

    services:
      docker:
        image: docker:dind
        options: --privileged --shm-size=2g
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
    container:
      image: ubuntu:latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          check-latest: true
          cache: 'maven'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.11
      - name: Build plugin and download dependencies
        run: mvn -V --color always -ntp install -Pskip
      - name: Run IT tests ${{ matrix.test }}
        run: |
          testName="${{ matrix.test }}"
          mvn -V --color always -ntp test --file pipeline-${testName%/*}/pom.xml -Dtest=${testName#*/}
